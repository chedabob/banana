[tools]
python = "3.11"

[tasks.install]
description = "Create venv and install Python training dependencies"
run = [
  "python -m venv training/.venv",
  "training/.venv/bin/pip install -r training/requirements.txt",
]

[tasks.train]
description = "Fine-tune YOLOv11n-cls on the banana ripeness dataset (set ROBOFLOW_API_KEY first)"
dir = "training"
depends = ["install"]
run = ".venv/bin/python train.py"
