[tools]
python = "3.11"

[env]
_.python.venv = { path = "{root}/training/.venv", create = true }

[tasks.install]
description = "Install Python training dependencies"
dir = "training"
run = "{root}/training/.venv/bin/pip install -r requirements.txt"

[tasks.train]
description = "Fine-tune YOLOv11n-cls on the banana ripeness dataset (set ROBOFLOW_API_KEY first)"
dir = "training"
depends = ["install"]
run = "{root}/training/.venv/bin/python train.py"
